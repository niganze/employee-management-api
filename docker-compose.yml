version: "3.9"

services:
  api:
    build: .
    container_name: employee_api
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      PORT: 5000
      DATABASE_URL: mysql://root:password@db:3306/employee_db
      JWT_SECRET: cyberstream_secret
      JWT_EXPIRES: 1d
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: mysql:8
    container_name: employee_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: employee_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: